version: '3.8'

services:
  box-backend:
    image: box-backend:latest
    container_name: box-backend
    restart: unless-stopped
    environment:
      - DEBUG=False
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - ALLOWED_HOSTS=localhost,127.0.0.1,box-backend,nginx,thezbr.com,www.thezbr.com,3.107.17.208
      - APPEND_SLASH=False
    volumes:
      # 持久化 SQLite 数据库
      - box-db:/app/data
    networks:
      - app-network

  p2p-backend:
    image: p2p-backend:latest
    container_name: p2p-backend
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5235
      - ALLOWED_ORIGINS=https://thezbr.com,https://www.thezbr.com,http://localhost:3000
    networks:
      - app-network

  student-backend:
    image: student-backend:latest
    container_name: student-backend
    restart: unless-stopped
    environment:
      - DEBUG=False
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - ALLOWED_HOSTS=localhost,127.0.0.1,student-backend,nginx,thezbr.com,www.thezbr.com,3.107.17.208
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    volumes:
      # 持久化 SQLite 数据库，防止容器重建时数据丢失
      - student-db:/app/data
    networks:
      - app-network

  nginx:
    image: integrated-nginx:latest
    container_name: integrated-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
    depends_on:
      - box-backend
      - p2p-backend
      - student-backend
    networks:
      - app-network

volumes:
  box-db:
  student-db:

networks:
  app-network:
    driver: bridge
