name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # 4个镜像并行构建
  # ─────────────────────────────────────────────────────────────
  build-box-backend:
    name: Build Box Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./box/box_back/box_back
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/box-backend:latest

  build-p2p-backend:
    name: Build P2P Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./P2P/P2P
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/p2p-backend:latest

  build-student-backend:
    name: Build Student Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./Student_Enroll_Grade_System/final
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/student-backend:latest

  build-integrated-nginx:
    name: Build Integrated Nginx (3 frontends)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 构建上下文是仓库根目录，Dockerfile 在 nginx/ 下
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/integrated-nginx:latest

  # ─────────────────────────────────────────────────────────────
  # 部署：等所有镜像构建完成后执行
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs:
      - build-box-backend
      - build-p2p-backend
      - build-student-backend
      - build-integrated-nginx
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # 上传 docker-compose 文件
      - name: Upload docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose-production.yml
          target: ~/ONE/
          strip_components: 0

      # 部署：写 .env，拉取镜像，重启容器
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,DJANGO_SECRET_KEY,JWT_SECRET_KEY
          script: |
            set -e
            mkdir -p ~/ONE

            echo "==> 写入 .env 文件"
            printf 'DJANGO_SECRET_KEY=%s\nJWT_SECRET_KEY=%s\n' \
              "$DJANGO_SECRET_KEY" "$JWT_SECRET_KEY" > ~/ONE/.env
            chmod 600 ~/ONE/.env

            echo "==> Docker Hub 登录"
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            echo "==> 拉取最新镜像"
            docker pull "$DOCKERHUB_USERNAME"/box-backend:latest
            docker pull "$DOCKERHUB_USERNAME"/p2p-backend:latest
            docker pull "$DOCKERHUB_USERNAME"/student-backend:latest
            docker pull "$DOCKERHUB_USERNAME"/integrated-nginx:latest

            echo "==> 重新打本地标签"
            docker tag "$DOCKERHUB_USERNAME"/box-backend:latest box-backend:latest
            docker tag "$DOCKERHUB_USERNAME"/p2p-backend:latest p2p-backend:latest
            docker tag "$DOCKERHUB_USERNAME"/student-backend:latest student-backend:latest
            docker tag "$DOCKERHUB_USERNAME"/integrated-nginx:latest integrated-nginx:latest

            echo "==> 重启所有服务"
            cd ~/ONE
            docker compose -f docker-compose-production.yml up -d --force-recreate

            echo "==> 清理旧镜像"
            docker image prune -f
